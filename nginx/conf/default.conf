proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=tactitok_cache:10m max_size=2g inactive=60m use_temp_path=off;

server {
    listen 80;

    # Block 1 — serve frontend HTML/JS/CSS from disk
    location / {
        root /var/www/tactitok;
        index index.html;
        try_files $uri $uri/ =404;
    }

    # Block 2 — forward API calls to backend
    location /api/ {
        proxy_pass http://172.16.163.34:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_redirect off;

        # Caching layer
        proxy_cache tactitok_cache;
        proxy_cache_valid 200 206 1d;
        proxy_cache_key "$request_uri$http_range";
        proxy_cache_methods GET HEAD;
        add_header X-Cache-Status $upstream_cache_status;

        # Range request support for video streaming
        proxy_set_header Range $http_range;
        proxy_set_header If-Range $http_if_range;
    }
}
proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=tactitok_cache:10m max_size=2g inactive=60m use_temp_path=off;

server {
    listen 80;

    location / {
        root /var/www/tactitok;
        index placeholder.html;
        try_files $uri $uri/ =404;
    }

    location /api/ {
        proxy_pass https://jsonplaceholder.typicode.com/;
        proxy_set_header Host jsonplaceholder.typicode.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_ssl_server_name on;
        proxy_redirect off;

        # Caching
        proxy_cache tactitok_cache;
        proxy_cache_valid 200 206 1d;
        proxy_cache_key "$request_uri$http_range";
        add_header X-Cache-Status $upstream_cache_status;
    }
}
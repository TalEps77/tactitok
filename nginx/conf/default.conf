server {
    listen 80;

    location / {
        root /var/www/tactitok;
        index placeholder.html;
        try_files $uri $uri/ =404;
    }

    location /api/ {
        proxy_pass http://10.123.187.97:8080/;
        proxy_set_header Host 10.123.187.97;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_redirect off;
    }
}
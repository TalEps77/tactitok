<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TactiTok Admin Portal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- תפריט הטאבים -->
    <div class="admin-tabs-container">
        <div class="admin-tab active" onclick="switchAdminTab('upload', this)">העלאת תוכן חדש</div>
        <div class="admin-tab" onclick="switchAdminTab('manage', this)">ניהול תכנים</div>
        <div class="admin-tab" onclick="switchAdminTab('categories', this)">ניהול קטגוריות</div>
        <div class="admin-tab" onclick="switchAdminTab('interests', this)">ניהול תחומי עניין</div>
    </div>

    <!-- העלאה -->
    <div id="panel-upload" class="admin-panel active">
        <h1>העלאת תוכן חדש</h1>

        <form id="uploadForm">
            <div class="input-group">
                <label for="contentFile">בחירת קובץ (MP4 או PDF):</label>
                <input type="file" id="contentFile" name="contentFile" accept="video/mp4, application/pdf" required>
                
                <div id="filePreview" class="hidden">
                    <span id="fileNameDisplay"></span>
                    <button type="button" id="removeFileBtn" title="הסר קובץ">✖</button>
                </div>
            </div>

            <div class="input-group">
                <label for="title">כותרת הסרטון/מסמך:</label>
                <input type="text" id="title" name="title" placeholder="כתבו כותרת כאן..." required>
            </div>

            <div class="input-group">
                <label for="description">תיאור הקובץ:</label>
                <textarea id="description" name="description" rows="3" placeholder="כתבו תיאור קצר..."></textarea>
            </div>

            <div class="input-group">
                <label for="category">קטגוריה:</label>
                <select id="category" name="category" required>
                    <option value="">טוען קטגוריות...</option>
                </select>
            </div>

            <div class="input-group">
                <label>תחומי עניין (ניתן לסמן כמה):</label>
                <div class="checkbox-group" id="interestsContainer">
                    <span>טוען תחומי עניין...</span>
                </div>
            </div>

            <!-- פס התקדמות -->
            <div id="progressContainer" class="hidden" style="margin-bottom: 20px;">
                <div style="width: 100%; background-color: #efefef; border-radius: 8px; overflow: hidden; height: 8px;">
                    <div id="progressBar" style="width: 0%; height: 100%; background-color: #0095f6; transition: width 0.3s;"></div>
                </div>
                <div id="progressText" style="font-size: 12px; color: #86868b; text-align: left; margin-top: 4px;">0%</div>
            </div>

            <button type="submit" id="submitBtn">העלה תוכן</button>
        </form>

        <p id="statusMessage"></p>
    </div>

    <!-- ניהול תכנים -->
    <div id="panel-manage" class="admin-panel">
        <h1>ניהול תכנים קיימים</h1>
        
        <div class="table-container">
            <table id="contentTable">
                <thead>
                    <tr>
                        <th>מזהה (ID)</th>
                        <th>כותרת</th>
                        <th>סוג</th>
                        <th>קטגוריה</th>
                        <th>פעולות</th>
                    </tr>
                </thead>
                <tbody id="contentTableBody">
                </tbody>
            </table>
        </div>
    </div>

    <!-- ניהול קטגוריות -->
    <div id="panel-categories" class="admin-panel">
        <h1>ניהול קטגוריות</h1>

        <form id="categoryForm">
            <div class="input-group">
                <label for="categoryName">שם קטגוריה:</label>
                <input type="text" id="categoryName" name="categoryName" placeholder="לדוגמה: בטיחות" required>
            </div>

            <div class="input-group">
                <label for="parentCategory">קטגוריית אב (אופציונלי):</label>
                <select id="parentCategory" name="parentCategory">
                    <option value="">ללא קטגוריית אב</option>
                </select>
            </div>

            <button type="submit" id="saveCategoryBtn">הוסף קטגוריה</button>
        </form>

        <p id="categoryStatusMessage"></p>

        <div class="table-container">
            <table id="categoriesTable">
                <thead>
                    <tr>
                        <th>מזהה (ID)</th>
                        <th>שם קטגוריה</th>
                        <th>קטגוריית אב</th>
                        <th>פעולות</th>
                    </tr>
                </thead>
                <tbody id="categoriesTableBody">
                </tbody>
            </table>
        </div>
    </div>

    <!-- ניהול תחומי עניין -->
    <div id="panel-interests" class="admin-panel">
        <h1>ניהול תחומי עניין</h1>

        <form id="interestForm">
            <div class="input-group">
                <label for="interestName">שם תחום עניין:</label>
                <input type="text" id="interestName" name="interestName" placeholder="לדוגמה: נהלים" required>
            </div>

            <button type="submit" id="saveInterestBtn">הוסף תחום עניין</button>
        </form>

        <p id="interestStatusMessage"></p>

        <div class="table-container">
            <table id="interestsTable">
                <thead>
                    <tr>
                        <th>מזהה (ID)</th>
                        <th>שם תחום עניין</th>
                        <th>פעולות</th>
                    </tr>
                </thead>
                <tbody id="interestsTableBody">
                </tbody>
            </table>
        </div>
    </div>

    <!-- מודל עריכת פריט תוכן -->
    <div id="editModal" class="modal hidden">
        <div class="modal-content" style="max-width: 400px;">
            <span class="close-btn" onclick="closeEditModal()">&times;</span>
            <h2 style="margin-top: 0;">עריכת פריט</h2>
            
            <form id="editForm">
                <input type="hidden" id="editId" name="id">
                
                <div class="input-group">
                    <label for="editTitle">כותרת:</label>
                    <input type="text" id="editTitle" name="title" required>
                </div>

                <div class="input-group">
                    <label for="editDescription">תיאור הקובץ:</label>
                    <textarea id="editDescription" name="description" rows="3" placeholder="כתבו תיאור קצר..."></textarea>
                </div>
                
                <div class="input-group">
                    <label for="editCategory">קטגוריה:</label>
                    <select id="editCategory" name="category" required>
                        <option value="">טוען קטגוריות...</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>תחומי עניין (ניתן לסמן כמה):</label>
                    <div class="checkbox-group" id="editInterestsContainer">
                        <span>טוען תחומי עניין...</span>
                    </div>
                </div>
                
                <button type="submit" id="saveEditBtn" style="width: 100%; padding: 10px; background: #0095f6; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer;">
                    שמור שינויים
                </button>
            </form>
        </div>
    </div>

    <!-- הגדרת בסיס ה-API לאדמין -->
    <script>
        window.TACTITOK_API_BASE = "";
    </script>

    <!-- שכבת API משותפת -->
    <script src="api.js"></script>

    <!-- סקריפט הניהול הראשי -->
    <script src="admin.js"></script>
    
    <!-- סקריפט להחלפת טאבים -->
    <script>
        function switchAdminTab(panelName, tabElement) {
            document.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.admin-panel').forEach(p => p.classList.remove('active'));
            
            tabElement.classList.add('active');
            document.getElementById('panel-' + panelName).classList.add('active');
        }
    </script>

</body>
</html>

<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>TactiTok - פאנל ניהול</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin-top: 50px; }
        .upload-box { border: 2px dashed #ccc; padding: 30px; width: 300px; margin: 0 auto; background: #f9f9f9; }
        button { background: #4CAF50; color: white; padding: 10px 20px; border: none; cursor: pointer; margin-top: 15px; }
    </style>
</head>
<body>
    <h1>מערכת ניהול תוכן - TactiTok</h1>
    
    <div class="upload-box">
        <h3>העלאת סרטון חדש</h3>
        <form action="/" method="post" enctype="multipart/form-data">
            <input type="file" name="file" required><br>
            <button type="submit">העלה קובץ</button>
        </form>
    </div>
</body>
</html>
